# Flux producer example configuration.
#
# `target` is the `ip:port` of a running flux-server UDP socket.
# Each `[[metrics]]` entry spawns one emitter task sending at `rate_hz` Hz.
# The `simulation` table picks one of four variants:
#   - constant      : fixed value
#   - random_range  : uniform in [min, max]
#   - sine          : offset + amplitude * sin(2*pi * t / period_ms)
#   - stepped       : cycles through `values`, holding each for `dwell_ms`

target = "127.0.0.1:9000"

[[metrics]]
name = "cpu.load"
unit = "percent"
rate_hz = 5.0
simulation = { kind = "sine", amplitude = 25.0, period_ms = 4000, offset = 50.0 }

[[metrics]]
name = "memory.used_mb"
unit = "MB"
rate_hz = 2.0
simulation = { kind = "random_range", min = 2048.0, max = 8192.0 }

[[metrics]]
name = "network.tx_kbps"
unit = "kbps"
rate_hz = 10.0
simulation = { kind = "constant", value = 750.0 }

[[metrics]]
name = "sensor.online"
rate_hz = 1.0
simulation = { kind = "stepped", values = [1.0, 1.0, 0.0, 1.0], dwell_ms = 1500 }
